server.port=5000

# Main SQLite file used by the Spring Boot backend.
# Override with BANK_DB_PATH or --app.db.path=... when needed.
app.db.path=${BANK_DB_PATH:./data/banking.db}
app.db.legacy-path=../backend/instance/banking.db
spring.datasource.driver-class-name=org.sqlite.JDBC
spring.jpa.database-platform=org.hibernate.community.dialect.SQLiteDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

spring.jackson.serialization.write-dates-as-timestamps=false

app.jwt.secret=replace-this-with-a-32-byte-minimum-secret-key
app.jwt.expiration-hours=24
app.cors.allowed-origins=http://localhost:5173,http://localhost:8080
app.admin.email=${APP_ADMIN_EMAIL:admin@vibebank.com}
app.openai.api-key=${OPENAI_API_KEY:}
app.openai.model=${OPENAI_MODEL:gpt-5-mini}
